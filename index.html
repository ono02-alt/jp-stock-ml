<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JP Stock ML - 日本株ML予測システム</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1e2530;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --blue: #58a6ff;
      --yellow: #d29922;
      --purple: #bc8cff;
      --accent: #1f6feb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 14px; }

    /* ヘッダー */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 16px; font-weight: 700; color: var(--blue); }
    .market-badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
    .badge-open { background: rgba(63,185,80,.2); color: var(--green); border: 1px solid var(--green); }
    .badge-closed { background: rgba(248,81,73,.15); color: var(--text-muted); border: 1px solid var(--border); }
    .session-label { font-size: 11px; color: var(--text-muted); }

    /* メインレイアウト */
    .container { max-width: 960px; margin: 0 auto; padding: 16px; }

    /* タブ */
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; gap: 2px; }
    .tab-btn { background: none; border: none; color: var(--text-muted); padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; font-size: 13px; transition: all .2s; }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 検索フォーム */
    .search-box { position: relative; margin-bottom: 16px; }
    .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 40px 10px 14px; color: var(--text); font-size: 14px; outline: none; }
    .search-input:focus { border-color: var(--accent); }
    .search-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; }

    /* 検索結果ドロップダウン */
    .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; max-height: 280px; overflow-y: auto; z-index: 200; display: none; }
    .search-result-item { padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .search-result-item:hover { background: var(--border); }
    .search-result-item:last-child { border-bottom: none; }
    .result-name { font-weight: 600; font-size: 13px; }
    .result-meta { font-size: 11px; color: var(--text-muted); }

    /* 予測カード */
    .pred-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .pred-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .pred-ticker { font-size: 20px; font-weight: 700; }
    .pred-name { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .pred-price { text-align: right; }
    .pred-price-val { font-size: 22px; font-weight: 700; }
    .pred-price-vol { font-size: 11px; color: var(--text-muted); }

    /* 予測メーター */
    .pred-meter-wrap { margin-bottom: 16px; }
    .pred-meter-label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; }
    .pred-meter { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
    .pred-meter-fill { height: 100%; border-radius: 5px; transition: width .6s ease; }
    .fill-bullish { background: linear-gradient(90deg, #3fb950, #58d68d); }
    .fill-bearish { background: linear-gradient(90deg, #f85149, #ff6b6b); }

    .pred-result { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }
    .pred-result.bullish { background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3); }
    .pred-result.bearish { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); }
    .pred-icon { font-size: 24px; }
    .pred-text-main { font-size: 16px; font-weight: 700; }
    .pred-text-sub { font-size: 11px; color: var(--text-muted); }
    .pred-confidence { margin-left: auto; text-align: right; }
    .pred-conf-val { font-size: 18px; font-weight: 700; }
    .pred-conf-lbl { font-size: 10px; color: var(--text-muted); }

    /* チャート */
    .chart-container { background: var(--surface2); border-radius: 8px; padding: 12px; margin-bottom: 16px; overflow: hidden; }
    #candleChart { width: 100%; height: 200px; }

    /* テクニカル情報 */
    .tech-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .tech-item { background: var(--surface2); border-radius: 6px; padding: 10px 12px; }
    .tech-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
    .tech-value { font-size: 14px; font-weight: 600; }

    /* 銘柄一覧テーブル */
    .stocks-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .stocks-table th { background: var(--surface2); padding: 8px 10px; text-align: left; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
    .stocks-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .stocks-table tr:hover { background: var(--surface2); cursor: pointer; }
    .bullish-tag { color: var(--green); font-weight: 700; }
    .bearish-tag { color: var(--red); font-weight: 700; }
    .conf-bar { display: inline-block; height: 4px; border-radius: 2px; vertical-align: middle; margin-left: 4px; }

    /* 取引分析 */
    .upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 32px 16px; text-align: center; cursor: pointer; transition: border-color .2s; margin-bottom: 16px; }
    .upload-area:hover, .upload-area.drag-over { border-color: var(--accent); }
    .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-label { font-size: 14px; color: var(--text-muted); }
    .upload-sublabel { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    #fileInput { display: none; }

    /* 分析結果 */
    .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .metric-card { background: var(--surface2); border-radius: 8px; padding: 12px; }
    .metric-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: 700; }
    .metric-value.positive { color: var(--green); }
    .metric-value.negative { color: var(--red); }

    .advice-section { margin-bottom: 16px; }
    .advice-title { font-size: 13px; font-weight: 700; color: var(--blue); margin-bottom: 10px; border-left: 3px solid var(--blue); padding-left: 8px; }
    .advice-item { background: var(--surface2); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .advice-indicator { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .advice-detail { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
    .effectiveness-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
    .eff-high { background: rgba(63,185,80,.2); color: var(--green); }
    .eff-mid { background: rgba(210,153,34,.2); color: var(--yellow); }
    .eff-low { background: rgba(139,148,158,.2); color: var(--text-muted); }

    .ai-advice-box { background: linear-gradient(135deg, rgba(31,111,235,.1), rgba(188,140,255,.1)); border: 1px solid rgba(88,166,255,.2); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .ai-advice-title { font-size: 12px; font-weight: 700; color: var(--purple); margin-bottom: 8px; }
    .ai-advice-text { font-size: 13px; line-height: 1.7; white-space: pre-wrap; }

    /* ローディング */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* エラー */
    .error-box { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); border-radius: 8px; padding: 12px 16px; color: var(--red); font-size: 13px; margin-bottom: 12px; }

    /* ステータスバー */
    .status-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 11px; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .status-item span { color: var(--text); font-weight: 600; }

    /* ボタン */
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity .2s; }
    .btn:hover { opacity: .8; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    /* RR改善 */
    .rr-section { background: var(--surface2); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .rr-title { font-size: 12px; font-weight: 700; color: var(--yellow); margin-bottom: 10px; }
    .rr-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .rr-row:last-child { border-bottom: none; }
    .rr-key { color: var(--text-muted); }

    @media (max-width: 480px) {
      .tech-grid { grid-template-columns: 1fr 1fr; }
      .metrics-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>📈 JP Stock ML</h1>
  <span id="marketBadge" class="market-badge badge-closed">閉場中</span>
  <span id="sessionLabel" class="session-label">−</span>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="predict">🔍 銘柄予測</button>
    <button class="tab-btn" data-tab="ranking">📊 予測ランキング</button>
    <button class="tab-btn" data-tab="trade">📋 取引分析</button>
    <button class="tab-btn" data-tab="status">⚙️ システム</button>
  </div>

  <!-- === 予測タブ === -->
  <div class="tab-panel active" id="tab-predict">
    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="銘柄コード or 銘柄名で検索（例: 7203 / トヨタ）"
        autocomplete="off"
      />
      <button class="search-btn" onclick="doSearch()">🔍</button>
      <div class="search-results" id="searchResults"></div>
    </div>
    <div id="predictionArea"></div>
  </div>

  <!-- === ランキングタブ === -->
  <div class="tab-panel" id="tab-ranking">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:12px;color:var(--text-muted);">機械学習による次の1分後の陽線確率でソート</div>
      <button class="btn btn-outline btn-sm" onclick="loadRanking()">🔄 更新</button>
    </div>
    <div id="rankingArea"><div class="loading"><div class="spinner"></div><div>読み込み中...</div></div></div>
  </div>

  <!-- === 取引分析タブ === -->
  <div class="tab-panel" id="tab-trade">
    <div
      class="upload-area"
      id="uploadArea"
      onclick="document.getElementById('fileInput').click()"
      ondragover="handleDragOver(event)"
      ondragleave="handleDragLeave(event)"
      ondrop="handleDrop(event)"
    >
      <div class="upload-icon">📂</div>
      <div class="upload-label">SBI証券 取引履歴CSVをアップロード</div>
      <div class="upload-sublabel">タップまたはドラッグ＆ドロップ</div>
      <div class="upload-sublabel" style="margin-top:8px;">対応: 現物・信用取引履歴CSV（Shift-JIS / UTF-8）</div>
    </div>
    <input type="file" id="fileInput" accept=".csv" onchange="uploadFile(event)" />
    <div id="tradeAnalysisArea"></div>
  </div>

  <!-- === システムタブ === -->
  <div class="tab-panel" id="tab-status">
    <div id="statusArea"><div class="loading"><div class="spinner"></div><div>読み込み中...</div></div></div>
  </div>
</div>

<script>
const API = '';

// ======= タブ切り替え =======
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const tabId = 'tab-' + btn.dataset.tab;
    document.getElementById(tabId).classList.add('active');
    if (btn.dataset.tab === 'ranking') loadRanking();
    if (btn.dataset.tab === 'status') loadStatus();
  });
});

// ======= ヘッダー状態更新 =======
async function updateHeader() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    const badge = document.getElementById('marketBadge');
    const label = document.getElementById('sessionLabel');
    const sessionMap = {
      pre_market: '開場前',
      morning: '前場中',
      lunch: '昼休み',
      afternoon: '後場中',
      post_market: '閉場後'
    };
    if (d.market_open) {
      badge.className = 'market-badge badge-open';
      badge.textContent = '開場中';
    } else {
      badge.className = 'market-badge badge-closed';
      badge.textContent = '閉場中';
    }
    label.textContent = sessionMap[d.session] || d.session;
  } catch(e) {}
}
updateHeader();
setInterval(updateHeader, 30000);

// ======= 検索 =======
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 1) { hideResults(); return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
});

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch(document.getElementById('searchInput').value.trim());
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) hideResults();
});

function hideResults() {
  document.getElementById('searchResults').style.display = 'none';
}

async function doSearch(q) {
  q = q || document.getElementById('searchInput').value.trim();
  if (!q) return;
  const res = document.getElementById('searchResults');
  res.style.display = 'block';
  res.innerHTML = '<div style="padding:10px;color:var(--text-muted)">検索中...</div>';
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (!d.results || d.results.length === 0) {
      res.innerHTML = '<div style="padding:10px;color:var(--text-muted)">見つかりませんでした</div>';
      return;
    }
    res.innerHTML = d.results.map(s => `
      <div class="search-result-item" onclick="loadPrediction('${s.ticker}','${s.name}')">
        <div>
          <div class="result-name">${s.name}</div>
          <div class="result-meta">${s.code} · ${s.market}</div>
        </div>
        <div class="result-meta">${s.ticker}</div>
      </div>
    `).join('');
  } catch(e) {
    res.innerHTML = `<div style="padding:10px;color:var(--red)">エラー: ${e.message}</div>`;
  }
}

// ======= 予測読み込み =======
async function loadPrediction(ticker, name) {
  hideResults();
  document.getElementById('searchInput').value = name || ticker;
  const area = document.getElementById('predictionArea');
  area.innerHTML = '<div class="loading"><div class="spinner"></div><div>予測計算中...</div></div>';

  try {
    const r = await fetch(`/api/predict/${ticker}`);
    const d = await r.json();
    if (d.error) {
      area.innerHTML = `<div class="error-box">${d.error}</div>`;
      return;
    }
    renderPrediction(area, d, ticker);
  } catch(e) {
    area.innerHTML = `<div class="error-box">通信エラー: ${e.message}</div>`;
  }
}

function renderPrediction(area, d, ticker) {
  const isBull = d.prediction === 'bullish';
  const bullPct = Math.round(d.bullish_prob * 100);
  const bearPct = Math.round(d.bearish_prob * 100);
  const conf = Math.round(d.confidence * 100);
  const candle = d.latest_candle || {};
  const acc = d.model_accuracy ? Math.round(d.model_accuracy * 100) : '−';

  // チャートデータ
  const chartData = d.chart_data || [];

  area.innerHTML = `
    <div class="pred-card">
      <div class="pred-header">
        <div>
          <div class="pred-ticker">${ticker.replace('.T','')}</div>
          <div class="pred-name">${d.name || ''}</div>
        </div>
        <div class="pred-price">
          <div class="pred-price-val">¥${(candle.close || d.price || 0).toLocaleString()}</div>
          <div class="pred-price-vol">出来高 ${(d.avg_volume || 0).toLocaleString()}</div>
        </div>
      </div>

      <div class="pred-result ${isBull ? 'bullish' : 'bearish'}">
        <div class="pred-icon">${isBull ? '🟢' : '🔴'}</div>
        <div>
          <div class="pred-text-main">${isBull ? '陽線（上昇）予測' : '陰線（下落）予測'}</div>
          <div class="pred-text-sub">次の1分足の方向性</div>
        </div>
        <div class="pred-confidence">
          <div class="pred-conf-val" style="color:${isBull ? 'var(--green)' : 'var(--red)'}">${conf}%</div>
          <div class="pred-conf-lbl">確信度</div>
        </div>
      </div>

      <div class="pred-meter-wrap">
        <div class="pred-meter-label">
          <span style="color:var(--green)">🟢 陽線 ${bullPct}%</span>
          <span style="color:var(--red)">陰線 ${bearPct}% 🔴</span>
        </div>
        <div class="pred-meter">
          <div class="pred-meter-fill fill-${isBull ? 'bullish':'bearish'}" style="width:${bullPct}%"></div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="candleChart"></canvas>
      </div>

      <div class="tech-grid">
        <div class="tech-item"><div class="tech-label">始値</div><div class="tech-value">¥${(candle.open||0).toLocaleString()}</div></div>
        <div class="tech-item"><div class="tech-label">高値</div><div class="tech-value" style="color:var(--red)">¥${(candle.high||0).toLocaleString()}</div></div>
        <div class="tech-item"><div class="tech-label">安値</div><div class="tech-value" style="color:var(--blue)">¥${(candle.low||0).toLocaleString()}</div></div>
        <div class="tech-item"><div class="tech-label">終値</div><div class="tech-value">¥${(candle.close||0).toLocaleString()}</div></div>
      </div>

      <div class="tech-grid">
        <div class="tech-item"><div class="tech-label">陽線確率</div><div class="tech-value" style="color:var(--green)">${bullPct}%</div></div>
        <div class="tech-item"><div class="tech-label">陰線確率</div><div class="tech-value" style="color:var(--red)">${bearPct}%</div></div>
        <div class="tech-item"><div class="tech-label">モデル精度</div><div class="tech-value">${acc}%</div></div>
        <div class="tech-item"><div class="tech-label">セッション</div><div class="tech-value" style="font-size:11px">${d.session||'−'}</div></div>
      </div>

      ${renderFeatureImportance(d.feature_importance)}
      <div style="font-size:10px;color:var(--text-muted);margin-top:12px;line-height:1.5;">
        ※ 本システムの予測は参考情報です。投資判断はご自身の責任でお願いします。<br>
        モデル学習日: ${d.model_trained_at ? d.model_trained_at.split('T')[0] : '−'}
      </div>
    </div>
  `;

  // ローソク足チャート描画
  drawCandleChart(chartData);
}

function renderFeatureImportance(fi) {
  if (!fi || Object.keys(fi).length === 0) return '';
  const top5 = Object.entries(fi).slice(0, 5);
  const max = top5[0][1];
  return `
    <div style="margin-top:8px;">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">特徴量重要度（上位5）</div>
      ${top5.map(([k,v]) => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <div style="font-size:10px;color:var(--text-muted);width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${k}</div>
          <div style="flex:1;background:var(--border);border-radius:3px;height:6px;">
            <div style="background:var(--blue);width:${Math.round(v/max*100)}%;height:100%;border-radius:3px;"></div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ======= ローソク足チャート =======
function drawCandleChart(data) {
  const canvas = document.getElementById('candleChart');
  if (!canvas || !data || data.length === 0) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 24;
  const H = 200;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const pad = { top: 10, bottom: 20, left: 8, right: 8 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const n = Math.min(data.length, 80);
  const slice = data.slice(-n);

  const prices = slice.flatMap(c => [c.high, c.low]);
  const minP = Math.min(...prices);
  const maxP = Math.max(...prices);
  const range = maxP - minP || 1;

  const candleW = Math.max(2, Math.floor(chartW / n) - 1);

  ctx.clearRect(0, 0, W, H);

  slice.forEach((c, i) => {
    const x = pad.left + i * (chartW / n) + candleW / 2;
    const isBull = c.close >= c.open;
    const color = isBull ? '#3fb950' : '#f85149';

    const yHigh = pad.top + (1 - (c.high - minP) / range) * chartH;
    const yLow  = pad.top + (1 - (c.low  - minP) / range) * chartH;
    const yOpen = pad.top + (1 - (c.open - minP) / range) * chartH;
    const yClose= pad.top + (1 - (c.close- minP) / range) * chartH;

    // ヒゲ
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.moveTo(x, yHigh);
    ctx.lineTo(x, yLow);
    ctx.stroke();

    // 実体
    const bodyTop = Math.min(yOpen, yClose);
    const bodyH = Math.max(1, Math.abs(yClose - yOpen));
    ctx.fillStyle = color;
    ctx.fillRect(x - candleW / 2, bodyTop, candleW, bodyH);
  });

  // 時間ラベル（最初・中間・最後）
  ctx.fillStyle = '#8b949e';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  [0, Math.floor(n / 2), n - 1].forEach(i => {
    if (!slice[i]) return;
    const x = pad.left + i * (chartW / n) + candleW / 2;
    const t = slice[i].time || '';
    const label = t.includes('T') ? t.split('T')[1].slice(0, 5) : t.slice(-5);
    ctx.fillText(label, x, H - 4);
  });
}

// ======= ランキング =======
async function loadRanking() {
  const area = document.getElementById('rankingArea');
  area.innerHTML = '<div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>';
  try {
    const r = await fetch('/api/predictions');
    const d = await r.json();
    const preds = d.predictions || {};
    const list = Object.entries(preds)
      .map(([ticker, p]) => ({ ticker, ...p }))
      .sort((a, b) => b.bullish_prob - a.bullish_prob);

    if (list.length === 0) {
      area.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted)">${d.message || '予測データがありません'}</div>`;
      return;
    }

    area.innerHTML = `
      <table class="stocks-table">
        <thead>
          <tr>
            <th>銘柄</th>
            <th>現在値</th>
            <th>予測</th>
            <th>陽線確率</th>
            <th>精度</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(p => {
            const isBull = p.prediction === 'bullish';
            const pct = Math.round(p.bullish_prob * 100);
            const barW = Math.round(Math.abs(p.bullish_prob - 0.5) * 200);
            return `<tr onclick="loadPrediction('${p.ticker}','${p.name||p.ticker}');document.querySelector('[data-tab=predict]').click()">
              <td>
                <div style="font-weight:700;font-size:12px">${p.ticker.replace('.T','')}</div>
                <div style="font-size:10px;color:var(--text-muted)">${p.name||''}</div>
              </td>
              <td>¥${(p.price||0).toLocaleString()}</td>
              <td class="${isBull?'bullish-tag':'bearish-tag'}">${isBull?'🟢陽':'🔴陰'}</td>
              <td>
                ${pct}%
                <span class="conf-bar" style="width:${barW}px;background:${isBull?'var(--green)':'var(--red)'}"></span>
              </td>
              <td>${p.model_accuracy ? Math.round(p.model_accuracy*100)+'%' : '−'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
  } catch(e) {
    area.innerHTML = `<div class="error-box">読み込みエラー: ${e.message}</div>`;
  }
}

// ======= 取引分析 =======
function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.add('drag-over');
}
function handleDragLeave(e) {
  document.getElementById('uploadArea').classList.remove('drag-over');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) analyzeFile(file);
}
function uploadFile(e) {
  const file = e.target.files[0];
  if (file) analyzeFile(file);
}

async function analyzeFile(file) {
  const area = document.getElementById('tradeAnalysisArea');
  area.innerHTML = '<div class="loading"><div class="spinner"></div><div>分析中... しばらくお待ちください</div></div>';

  const form = new FormData();
  form.append('file', file);

  try {
    const r = await fetch('/api/analyze-trades', { method: 'POST', body: form });
    const d = await r.json();
    if (d.error) { area.innerHTML = `<div class="error-box">${d.error}</div>`; return; }
    renderTradeAnalysis(area, d);
  } catch(e) {
    area.innerHTML = `<div class="error-box">エラー: ${e.message}</div>`;
  }
}

function renderTradeAnalysis(area, d) {
  const m = d.summary_metrics || {};
  const pf = (m.profit_factor || 0).toFixed(2);
  const rr = (m.risk_reward || 0).toFixed(2);
  const wr = m.win_rate ? Math.round(m.win_rate * 100) : 0;
  const totalPnl = m.total_pnl || 0;

  let html = `
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">
      総取引数: <span style="color:var(--text);font-weight:700">${m.total_trades||0}</span> 件 分析完了
    </div>
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">合計損益</div>
        <div class="metric-value ${totalPnl>=0?'positive':'negative'}">¥${Math.round(totalPnl).toLocaleString()}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">勝率</div>
        <div class="metric-value ${wr>=50?'positive':'negative'}">${wr}%</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">リスクリワード</div>
        <div class="metric-value ${rr>=1?'positive':'negative'}">${rr}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">プロフィットファクター</div>
        <div class="metric-value ${pf>=1?'positive':'negative'}">${pf}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">平均利益</div>
        <div class="metric-value positive">¥${Math.round(m.avg_win||0).toLocaleString()}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">平均損失</div>
        <div class="metric-value negative">¥${Math.round(m.avg_loss||0).toLocaleString()}</div>
      </div>
    </div>
  `;

  // AI分析
  if (d.ai_advice) {
    html += `
      <div class="ai-advice-box">
        <div class="ai-advice-title">🤖 AIトレーディングコーチ</div>
        <div class="ai-advice-text">${escHtml(d.ai_advice)}</div>
      </div>
    `;
  }

  // 銘柄別分析
  const perTicker = d.per_ticker_analysis || {};
  Object.entries(perTicker).forEach(([ticker, ta]) => {
    const advice = ta.technical_advice || {};
    const ee = ta.entry_exit_analysis || {};

    html += `<div style="margin-bottom:20px;">
      <div class="advice-title">📌 ${ticker.replace('.T','')} ${advice.ticker||''}</div>`;

    // エントリー・決済最適化
    if (ee.actual_entry) {
      html += `
        <div class="rr-section">
          <div class="rr-title">💡 エントリー・決済の改善ポイント（直近トレード）</div>
          <div class="rr-row"><span class="rr-key">実際のエントリー</span><span>¥${ee.actual_entry.toLocaleString()}</span></div>
          <div class="rr-row"><span class="rr-key">実際の決済</span><span>¥${ee.actual_exit.toLocaleString()}</span></div>
          <div class="rr-row"><span class="rr-key">実際の損益/株</span><span style="color:${ee.actual_pnl_per_share>=0?'var(--green)':'var(--red)'}">¥${ee.actual_pnl_per_share}</span></div>
          <div class="rr-row"><span class="rr-key">最適エントリー</span><span style="color:var(--blue)">¥${ee.optimal_entry}</span></div>
          <div class="rr-row"><span class="rr-key">最適決済</span><span style="color:var(--blue)">¥${ee.optimal_exit}</span></div>
          <div class="rr-row"><span class="rr-key">最適損益/株</span><span style="color:var(--green)">¥${ee.optimal_pnl_per_share}</span></div>
          <div class="rr-row"><span class="rr-key">改善余地</span><span style="color:var(--yellow);font-weight:700">¥${ee.improvement_potential}</span></div>
        </div>
        <div class="advice-item">
          <div class="advice-indicator">📍 エントリーアドバイス</div>
          <div class="advice-detail">${(ee.entry_advice||[]).join('<br>')}</div>
        </div>
        <div class="advice-item">
          <div class="advice-indicator">🏁 決済アドバイス</div>
          <div class="advice-detail">${(ee.exit_advice||[]).join('<br>')}</div>
        </div>
      `;
    }

    // テクニカル指標アドバイス
    const indicators = advice.indicators_advice || [];
    if (indicators.length > 0) {
      html += `<div class="advice-section"><div class="advice-title">📐 テクニカル指標の有効性</div>`;
      indicators.forEach(ind => {
        const effClass = ind.effectiveness === '高い' ? 'eff-high' : ind.effectiveness === '中程度' ? 'eff-mid' : 'eff-low';
        html += `
          <div class="advice-item">
            <div class="advice-indicator">
              ${ind.indicator}
              <span class="effectiveness-badge ${effClass}">${ind.effectiveness}</span>
            </div>
            <div class="advice-detail">${escHtml(ind.detail)}</div>
          </div>
        `;
      });
      html += `</div>`;
    }

    // 推奨戦略
    const strats = (advice.recommended_strategies || []);
    if (strats.length > 0) {
      html += `<div class="advice-section"><div class="advice-title">🎯 推奨戦略</div>`;
      strats.forEach(s => {
        html += `
          <div class="advice-item">
            <div class="advice-indicator">✅ ${s.strategy}</div>
            <div class="advice-detail">${escHtml(s.reason)}</div>
          </div>
        `;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  area.innerHTML = html;
}

// ======= システム状況 =======
async function loadStatus() {
  const area = document.getElementById('statusArea');
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    const prog = d.training_progress || {};
    const pct = prog.completion_pct ? prog.completion_pct.toFixed(1) : 0;
    const trained = (prog.trained||[]).length;
    const total = (prog.total||[]).length;

    area.innerHTML = `
      <div class="status-bar">
        <div>セッション: <span>${{'pre_market':'開場前','morning':'前場中','lunch':'昼休み','afternoon':'後場中','post_market':'閉場後'}[d.session]||d.session}</span></div>
        <div>市場: <span style="color:${d.market_open?'var(--green)':'var(--text-muted)'}">${d.market_open?'開場中':'閉場中'}</span></div>
        <div>モデル数: <span>${d.trained_models}</span></div>
        <div>JST: <span>${d.server_time_jst?.split('T')[1]?.slice(0,8)||'−'}</span></div>
      </div>

      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;">
        <div style="font-size:13px;font-weight:700;margin-bottom:12px;">🤖 機械学習 進捗状況</div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;">
          <span>学習完了: ${trained} / ${total} 銘柄</span>
          <span>${pct}%</span>
        </div>
        <div style="background:var(--border);border-radius:4px;height:8px;">
          <div style="background:var(--blue);width:${pct}%;height:100%;border-radius:4px;transition:width .5s"></div>
        </div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:8px;">
          モード: ${prog.mode||'−'} ・ 最終更新: ${prog.last_updated?.split('T')[0]||'−'}
        </div>
      </div>

      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;">
        <div style="font-size:13px;font-weight:700;margin-bottom:12px;">ℹ️ システム情報</div>
        <div style="font-size:12px;color:var(--text-muted);line-height:2">
          ・ データソース: Yahoo Finance (yfinance) / JPX公式 XLS<br>
          ・ 1分足: 最大7日間取得可能<br>
          ・ 歴史的学習: バブル崩壊後（1991年〜）の日足データ使用（初回のみ）<br>
          ・ ザラバ学習: 前場・後場中に1分足データで随時更新<br>
          ・ ML: LightGBM（フォールバック: scikit-learn GBM）<br>
          ・ 実行環境: GitHub Actions（公開リポジトリ・無料）<br>
          ・ Anthropic API: 取引分析のAIアドバイスに使用
        </div>
      </div>
    `;
  } catch(e) {
    area.innerHTML = `<div class="error-box">ステータス取得エラー: ${e.message}</div>`;
  }
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
