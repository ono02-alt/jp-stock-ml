name: JP Stock ML - テスト

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: ディレクトリ作成
        run: mkdir -p logs models data/cache

      - name: テスト実行
        run: python -m pytest tests/test_all.py -v --tb=short 2>&1

      - name: カバレッジレポート（オプション）
        if: always()
        run: |
          pip install pytest-cov 2>/dev/null || true
          python -m pytest tests/test_all.py --cov=src --cov-report=term-missing 2>&1 || true
